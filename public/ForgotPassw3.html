<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password - RayaListly</title>

  <link rel="icon" href="bilder/icon.png">
  <link rel="stylesheet" href="forgotpassword3.css">
</head>

<body>
  <header class="topbar">
    <a href="PublicHome1.html" class="logo-link">
      <img src="bilder/logo.png" alt="RayaListly logo" class="logo">
    </a>
  </header>

  <main class="page">
    <section class="reset-wrapper">
      <div class="reset-card">
        <span class="card-badge">Password help</span>

        <h1>Forgot your password?</h1>
        <p class="card-text">
          Enter your username and email address. If they match an account, we will send you a password reset link.
        </p>

        <div class="form-group">
          <label for="reset-username">Username</label>
          <input
            type="text"
            id="reset-username"
            placeholder="Enter your username"
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="reset-email">Email</label>
          <input
            type="email"
            id="reset-email"
            placeholder="Enter your email address"
            autocomplete="email"
          >
        </div>

        <button id="resetBtn" class="send-btn" type="button">Send reset link</button>

        <p id="messageBox" class="message-box hidden-message" aria-live="polite"></p>

        <a href="PublicHome1.html" class="back-link">Back to login</a>
      </div>
    </section>
  </main>

  <script src="forgot.js"></script>
</body>
</html>
