<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reset Password - RayaListly</title>

<link rel="icon" href="bilder/icon.png">
<link rel="stylesheet" href="resetpassword.css">

</head>

<body>

<header class="topbar">
  <a href="PublicHome1.html" class="logo-link">
    <img src="bilder/logo.png" alt="RayaListly logo" class="logo">
  </a>
</header>

<main class="page">

<section class="reset-wrapper">

<div class="reset-card">

<span class="card-badge">Security</span>

<h1>Reset your password</h1>

<p class="card-text">
Enter a new password for your account.
</p>

<div class="form-group">
<label for="new-password">New password</label>

<input
type="password"
id="new-password"
placeholder="Enter new password"
autocomplete="new-password"
>
</div>

<button id="saveBtn" class="save-btn">Save new password</button>

<p id="messageBox" class="message-box hidden-message"></p>

<a href="PublicHome1.html" class="back-link">Back to login</a>

</div>

</section>

</main>

<script src="reset-password.js"></script>

</body>
</html>
